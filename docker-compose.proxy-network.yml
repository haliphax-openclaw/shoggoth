# Optional overlay: attach `shoggoth` to external network `proxy` (e.g. LM at `http://kiro:8000`).
# Kick-tires includes this by default in docker-compose.kick-tires.yml; use this file with the base stack only:
#   docker compose -f docker-compose.yml -f docker-compose.proxy-network.yml up -d
services:
  shoggoth:
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
